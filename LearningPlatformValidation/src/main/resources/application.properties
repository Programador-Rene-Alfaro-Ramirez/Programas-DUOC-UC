# ==========================================
# CONFIGURACIÓN DE BASE DE DATOS H2
# ==========================================
spring.datasource.url=jdbc:h2:mem:learningdb
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect

# Permite que Spring Boot cree las tablas automáticamente basadas en tus modelos
spring.jpa.hibernate.ddl-auto=create  
spring.jpa.show-sql=true

# Habilita la consola web de H2 para que puedas ver tus tablas en el navegador
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# ==========================================
# CONFIGURACIONES DEL SERVIDOR
# ==========================================
server.port=8080

# ==========================================
# CONFIGURACIÓN DE ACTUATOR (MONITOREO)
# ==========================================
management.endpoints.web.exposure.include=health,info,metrics,env
management.endpoint.health.show-details=always

# ==========================================
# CONFIGURACIÓN DE LOGGING
# ==========================================
logging.level.org.springframework.web=DEBUG
logging.level.com.duoc.LearningPlatformValidation=DEBUG

# ==========================================
# CONFIGURACIÓN ADICIONAL
# ==========================================
spring.main.allow-circular-references=true
spring.jpa.open-in-view=false 